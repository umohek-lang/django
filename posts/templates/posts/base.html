{% load static %}
{% load django_browser_reload %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Blog Post App</title>

    <!-- <link rel="stylesheet" href="{% static 'posts/main.css' %}"> -->
    <link rel="stylesheet" href="{% static 'posts/main.css' %}?v=2">

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
</head>
<body>
    {% django_browser_reload_script %}
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-logo">
            <a href="/">
                <img class="logo" src="{% static 'posts/Screenshot 2026-05-16 201727.png' %}" alt="My Logo">
            </a>
        </div>

        <ul class="navbar-links"> 
            <li>
                <a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Home</a>
            </li>

            {% if user.is_authenticated %}
            <li>
                <a href="{% url 'blogposts' %}" class="{% if request.path == '/blogposts' %}active{% endif %}">My Blogposts</a>
            </li>

            <li>
                <a href="{%url 'profile' %}" class="{% if request.path == '/users/profile' %}active{% endif %}">Sign in as: {{user.username}}</a>
            </li>


            <li>
                <a href="{%url 'logoutconfirm'%}" class="{% if request.path == '/users/confirm/logout' %}active{% endif %}">Logout</a>
            </li>
            {%else%}

            <li>
                <a href="{% url 'signup' %}" class="{% if request.path == '/users/signup' %}active{% endif %}">Signup</a>
            </li>

             <li>
                <a href="{% url 'login' %}" class="{% if request.path == '/users/login' %}active{% endif %}">Login</a>
            </li>
            
             


            {%endif%}
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
